name: Build SB APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install npm dependencies
        working-directory: sb-apk
        run: npm install --no-audit --no-fund

      - name: Refresh web assets
        run: |
          mkdir -p sb-apk/www
          cp -f index.html styles.css app.js manifest.webmanifest sw.js sb-apk/www/ || true
          if [ -f icon-192.png ]; then cp -f icon-192.png icon-512.png sb-apk/www/; fi
          ls -la sb-apk/www/

      - name: Capacitor sync
        working-directory: sb-apk
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: sb-apk/android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: sb-apk/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p output
          cp sb-apk/android/app/build/outputs/apk/debug/app-debug.apk output/SB.apk
          ls -la output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SB-apk
          path: output/SB.apk
          if-no-files-found: error

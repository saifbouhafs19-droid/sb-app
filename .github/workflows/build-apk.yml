name: Build SB APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: sb-apk
        run: npm ci || npm install

      - name: Sync web assets to Capacitor
        working-directory: sb-apk
        run: |
          mkdir -p www
          cp ../index.html ../styles.css ../app.js ../manifest.webmanifest ../sw.js www/ 2>/dev/null || true
          cp ../icon-192.png ../icon-512.png www/ 2>/dev/null || true
          npx cap sync android

      - name: Build Debug APK
        working-directory: sb-apk/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p output
          cp sb-apk/android/app/build/outputs/apk/debug/app-debug.apk output/SB.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SB-apk
          path: output/SB.apk

      - name: Create release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/SB.apk

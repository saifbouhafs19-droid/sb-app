name: Build SB APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Show pre-installed Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_HOME" || true
          ls "$ANDROID_HOME/platforms" || true

      - name: Install npm dependencies
        working-directory: sb-apk
        run: npm install --no-audit --no-fund

      - name: Refresh web assets into Capacitor
        run: |
          mkdir -p sb-apk/www
          cp -f index.html styles.css app.js manifest.webmanifest sw.js sb-apk/www/
          if [ -f icon-192.png ]; then cp -f icon-192.png icon-512.png sb-apk/www/; fi
          ls -la sb-apk/www/

      - name: Capacitor sync
        working-directory: sb-apk
        run: npx cap sync android

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > sb-apk/android/local.properties
          cat sb-apk/android/local.properties

      - name: Build Debug APK
        working-directory: sb-apk/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        run: |
          find sb-apk/android -name "*.apk" -type f
          mkdir -p output
          cp sb-apk/android/app/build/outputs/apk/debug/app-debug.apk output/SB.apk
          ls -la output/

      - name: Upload SB.apk
        uses: actions/upload-artifact@v4
        with:
          name: SB-apk
          path: output/SB.apk
          if-no-files-found: error
